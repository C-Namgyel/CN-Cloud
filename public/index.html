<html>

<head>
    <title>CN Cloud</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div id="loading-container" class="loading-container">
        <label id="loading-text" class="loading-text">Loading...</label>
    </div>
    <div class="header">
        <h1>CN Cloud</h1>
        <button onclick="showOptions();">+ New</button>
        <div id="add-list" class="add-list">
            <button onclick="this.children[0].click()">Upload File<input oninput="upload(this)" type="file" hidden></button><br>
            <button>Create Folder</button>
        </div>
    </div>
    <div class="container">
        <button onclick="back()">Back</button>
        <span id="dirUrl">/</span>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Size</th>
                    <th>Modified Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="fileTable">

            </tbody>
            <tfoot>
                <td id="uploadName"></td><td id="uploadProgress" colspan="2"></td><td></td>
            </tfoot>
        </table>
    </div>
</body>
<script src="./script.js"></script>

</html>
